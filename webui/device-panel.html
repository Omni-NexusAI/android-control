<title>Android Control Panel</title>
<!-- Android Control Panel (A0 Modal) -->
<div class="dc-panel-container">
  <div class="dc-header">
    <h3>Control Panel</h3>
  </div>

  <div class="dc-top-row">
  <div class="dc-section dc-connection-section">
    <div class="dc-section-title">Connection</div>
    <div class="dc-device-selector-row">
      <label class="dc-selector-label">Device</label>
      <select id="dc-device-select" class="dc-device-select" onchange="dcSelectDevice(this.value)">
        <option value="">-- Loading... --</option>
      </select>
    </div>
    <button class="dc-disconnect-float" onclick="dcDisconnect()" title="Disconnect">&#x2716;</button>
    <div class="dc-status-grid">
      <div class="dc-field">
        <label>Device</label>
        <span id="dc-device-id" class="dc-value">Loading...</span>
      </div>
      <div class="dc-field">
        <label>Model</label>
        <span id="dc-device-model" class="dc-value">--</span>
      </div>
      <div class="dc-field">
        <label>Status</label>
        <span id="dc-connection-status" class="dc-status-badge" style="background:rgba(15,52,96,0.5);color:#8ab4f8">Loading...</span>
      </div>
     </div>
    <div class="dc-btn-row">
      <button class="dc-btn dc-btn-secondary" onclick="dcLoadDevices()">&#x1F504; Refresh</button>
      <button class="dc-btn dc-btn-secondary" onclick="openModal('/plugins/droidclaw/webui/pairing.html')">&#x1F4F1; Pair New Device</button>
    </div>
   </div>
   <div class="dc-section">
    <div class="dc-section-title">Quick Actions</div>
    <div class="dc-actions-bar">
      <button class="dc-btn dc-btn-action" onclick="dcWake()">&#x231A; Wake</button>
      <button class="dc-btn dc-btn-action" onclick="dcHome()">&#x1F3E0; Home</button>
      <button class="dc-btn dc-btn-action" onclick="dcBack()">&#x25C0; Back</button>
      <button class="dc-btn dc-btn-action" onclick="dcRecents()">&#x25A0; Recents</button>
      <button class="dc-btn dc-btn-action" onclick="dcScreenshot()">&#x1F4F7; Screenshot</button>
      <button class="dc-btn dc-btn-action" onclick="dcScreenDump()">&#x1F4CB; Dump</button>
    </div>
   </div>
  </div>

  <div class="dc-section dc-preview-section">
    <div class="dc-section-title">Screen Preview <span id="dc-live-badge" class="dc-live-badge" style="display:none;">&#x25CF; Live</span></div>
    <div class="dc-preview-container">
      <img id="dc-screenshot-img" class="dc-preview-img" src="" alt="No screenshot" />
      <button class="dc-btn dc-btn-small dc-preview-refresh" onclick="dcScreenshot()">&#x1F504; Refresh</button>
    </div>
  </div>

  <div class="dc-section">
    <div class="dc-section-title">Run Task</div>
    <div class="dc-form">
      <div class="dc-form-group">
        <label for="dc-goal">Goal</label>
        <input type="text" id="dc-goal" placeholder="Manually prompt agent task directly here" />
      </div>
      <div class="dc-btn-row">
        <button class="dc-btn dc-btn-primary dc-btn-wide" id="dc-start-btn" onclick="dcStartTask()">&#x25B6; Start Task</button>
        <button class="dc-btn dc-btn-danger dc-btn-wide" id="dc-stop-btn" onclick="dcStopTask()" disabled>&#x25A0; Stop Task</button>
      </div>
      <div id="dc-task-status" class="dc-task-status"></div>
    </div>
  </div>

  <div class="dc-section">
    <div class="dc-section-title">Workflows</div>
    <div id="dc-workflow-list" class="dc-workflow-list">
      <div class="dc-empty-state">No saved workflows</div>
    </div>
    <div class="dc-btn-row">
      <button class="dc-btn dc-btn-secondary" onclick="dcSaveWorkflow()">&#x1F4BE; Save Current</button>
    </div>
  </div>
</div>

<style>

  background: #1a1a2e;
  color: #e0e0e0;
  border-radius: 8px;
  padding: 16px;
  box-sizing: border-box;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  font-size: 13px;
}

  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 16px;
  padding-bottom: 12px;
  border-bottom: 1px solid #2a2a4e;
}
.dc-header h3 { margin: 0; font-size: 16px; color: #e94560; }

  background: #16213e;
  border-radius: 8px;

}

.dc-status-disconnected { background: #601a1a; color: #e94560; }

}

.dc-task-state.queued { color: #f2c94c; }
</style>

<script>
(function() {
  var STORAGE_KEY = 'dc_current_device';
  var FOCUS_STATE_KEY = 'dc_focus_state_v1';
  var PANEL_STATE_KEY = 'dc_panel_state_v2';
  var TASK_STATE_KEY = 'dc_task_state_v2';
  var csrfToken = null;
  var csrfPromise = null;
  var dcDeviceRefreshTimer = null;
  var dcAutoRefreshInterval = null;
  var dcTaskWatchTimer = null;
  var dcInitialized = false;
  var dcVisibilityHandler = null;
  var dcFocusHandler = null;

  if (typeof window.__dcPanelCleanup === 'function') {
    try { window.__dcPanelCleanup(); } catch(e) {}
  }

  function getStoredDevice() {
    try { return localStorage.getItem(STORAGE_KEY) || null; } catch(e) { return null; }
  }

  function setStoredDevice(dev) {
    try { if (dev) localStorage.setItem(STORAGE_KEY, dev); else localStorage.removeItem(STORAGE_KEY); } catch(e) {}
  }

  function getFocusState() {
    var state = loadJson(FOCUS_STATE_KEY, null);
    if (!state || state.mode !== 'pinned' || !state.serial) {
      return {mode: 'auto', serial: '', label: 'Auto', aliases: []};
    }
    return {
      mode: 'pinned',
      serial: state.serial || '',
      label: state.label || state.serial || '',
      aliases: state.aliases || []
    };
  }

  function setFocusAuto() {
    setStoredDevice(null);
    var state = {mode: 'auto', serial: '', label: 'Auto', aliases: []};
    saveJson(FOCUS_STATE_KEY, state);
    savePanelState({focus_mode: 'auto', focused_device_serial: '', focused_device_label: 'Auto'});
    return state;
  }

  function setFocusPinned(serial, label, aliases) {
    setStoredDevice(serial);
    var state = {mode: 'pinned', serial: serial || '', label: label || serial || '', aliases: aliases || []};
    saveJson(FOCUS_STATE_KEY, state);
    savePanelState({focus_mode: 'pinned', focused_device_serial: state.serial, focused_device_label: state.label});
    return state;
  }

  function getActionDevice() {
    var focus = getFocusState();
    return focus.mode === 'pinned' ? focus.serial : '';
  }

  function loadJson(key, fallback) {
    try {
      var raw = localStorage.getItem(key);
      return raw ? JSON.parse(raw) : fallback;
    } catch(e) {
      return fallback;
    }
  }

  function saveJson(key, value) {
    try { localStorage.setItem(key, JSON.stringify(value)); } catch(e) {}
  }

  function escHtml(value) {
    return String(value == null ? '' : value).replace(/[&<>"']/g, function(ch) {
      return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch];
    });
  }

  function getEl(id) {
    return document.getElementById(id);
  }

  function panelReady() {
    return !!(getEl('dc-device-select') && getEl('dc-device-id') && getEl('dc-task-status'));
  }

  function whenPanelReady(callback) {
    var tries = 0;
    function tick() {
      if (panelReady()) {
        callback();
        return;
      }
      tries += 1;
      if (tries < 80) {
        setTimeout(tick, 25);
      }
    }
    tick();
  }

  function getCsrfToken() {
    if (csrfToken) return Promise.resolve(csrfToken);
    if (csrfPromise) return csrfPromise;
    csrfPromise = fetch('/api/csrf_token', {credentials: 'same-origin'})
      .then(function(r) { return r.json(); })
      .then(function(res) {
        csrfToken = res.token || '';
        return csrfToken;
      })
      .finally(function() { csrfPromise = null; });
    return csrfPromise;
  }

  function apiCall(endpoint, body) {
    return getCsrfToken().then(function(token) {
      return fetch('/api/plugins/droidclaw/' + endpoint, {
        method: 'POST',
        credentials: 'same-origin',
        headers: {'Content-Type': 'application/json', 'X-CSRF-Token': token},
        body: JSON.stringify(body || {})
      });
    }).then(function(r) { return r.json(); });
  }

  function rootApiCall(endpoint, body) {
    return getCsrfToken().then(function(token) {
      return fetch('/api/' + endpoint.replace(/^\/+/, ''), {
        method: 'POST',
        credentials: 'same-origin',
        headers: {'Content-Type': 'application/json', 'X-CSRF-Token': token},
        body: JSON.stringify(body || {})
      });
    }).then(function(r) { return r.json(); });
  }

  function fetchPluginConfig() {
    return getCsrfToken().then(function(token) {
      return fetch('/api/plugins', {
        method: 'POST',
        credentials: 'same-origin',
        headers: {'Content-Type': 'application/json', 'X-CSRF-Token': token},
        body: JSON.stringify({action: 'get_config', plugin_name: 'droidclaw'})
      });
    })
    .then(function(r) { return r.json(); })
    .then(function(data) { return data.data || {}; })
    .catch(function() { return {}; });
  }

  function setConnected(deviceId, model) {
    var focus = getFocusState();
    if (focus.mode === 'pinned' && deviceId) setStoredDevice(deviceId);
    getEl('dc-device-id').textContent = deviceId || '--';
    getEl('dc-device-model').textContent = model || '--';
    getEl('dc-connection-status').textContent = deviceId ? (focus.mode === 'pinned' ? 'Pinned' : 'Connected') : 'Auto';
    getEl('dc-connection-status').className = deviceId ? 'dc-status-badge dc-status-connected' : 'dc-status-badge';
    savePanelState({active_device: deviceId || '', model: model || '', status: deviceId ? (focus.mode === 'pinned' ? 'Pinned' : 'Connected') : 'Auto'});
  }

  function setDisconnected() {
    getEl('dc-device-id').textContent = '--';
    getEl('dc-device-model').textContent = '--';
    getEl('dc-connection-status').textContent = 'Disconnected';
    getEl('dc-connection-status').className = 'dc-status-badge dc-status-disconnected';
    savePanelState({active_device: '', model: '', status: 'Disconnected'});
  }

  function savePanelState(patch) {
    var state = loadJson(PANEL_STATE_KEY, {});
    for (var key in patch) state[key] = patch[key];
    state.updated_at = new Date().toISOString();
    saveJson(PANEL_STATE_KEY, state);
  }

  function restorePanelState() {
    var state = loadJson(PANEL_STATE_KEY, {});
    var focus = getFocusState();
    var select = getEl('dc-device-select');
    if (select) {
      select.innerHTML = '';
      var autoOpt = document.createElement('option');
      autoOpt.value = '';
      autoOpt.textContent = 'Auto';
      autoOpt.selected = focus.mode === 'auto';
      select.appendChild(autoOpt);
      var pinnedFound = false;
      (state.devices || []).forEach(function(dev) {
        var opt = document.createElement('option');
        opt.value = dev.serial;
        opt.textContent = (dev.model || dev.serial) + ' (' + dev.serial + ')';
        if (focus.mode === 'pinned' && dev.serial === focus.serial) {
          opt.selected = true;
          pinnedFound = true;
        }
        select.appendChild(opt);
      });
      if (focus.mode === 'pinned' && !pinnedFound) {
        var missing = document.createElement('option');
        missing.value = focus.serial;
        missing.textContent = (focus.label || focus.serial) + ' (unavailable)';
        missing.selected = true;
        select.appendChild(missing);
      }
    }
    if (focus.mode === 'pinned') {
      if (state.active_device === focus.serial) {
        setConnected(state.active_device, state.model || '');
      } else {
        getEl('dc-device-id').textContent = focus.serial;
        getEl('dc-device-model').textContent = '--';
        getEl('dc-connection-status').textContent = 'Unavailable';
        getEl('dc-connection-status').className = 'dc-status-badge dc-status-disconnected';
      }
    } else if (state.active_device) {
      setConnected(state.active_device, state.model || '');
    } else if (state.status) {
      getEl('dc-device-id').textContent = '--';
      getEl('dc-device-model').textContent = '--';
      getEl('dc-connection-status').textContent = state.status;
      getEl('dc-connection-status').className = state.status === 'Disconnected'
        ? 'dc-status-badge dc-status-disconnected'
        : 'dc-status-badge';
    }
  }

  function getCurrentContext() {
    try {
      if (typeof window.getContext === 'function') return window.getContext() || '';
      if (window.Alpine && Alpine.store('chats')) return Alpine.store('chats').selected || '';
    } catch(e) {}
    return '';
  }

  function getSelectedContextMeta(contextId) {
    try {
      if (!window.Alpine || !Alpine.store('chats')) return null;
      var store = Alpine.store('chats');
      if (store.selectedContext && (!contextId || store.selectedContext.id === contextId)) {
        return store.selectedContext;
      }
      return (store.contexts || []).filter(function(ctx) { return ctx.id === contextId; })[0] || null;
    } catch(e) {
      return null;
    }
  }

  function getDeviceLabel(serial) {
    var select = getEl('dc-device-select');
    var focus = getFocusState();
    if (!serial && focus.mode === 'pinned') return focus.label || focus.serial;
    if (!serial) return 'Auto';
    if (select) {
      for (var i = 0; i < select.options.length; i++) {
        if (select.options[i].value === serial) return select.options[i].textContent;
      }
    }
    return serial;
  }

  function saveTaskState(patch) {
    var state = loadJson(TASK_STATE_KEY, {});
    for (var key in patch) state[key] = patch[key];
    state.updated_at = new Date().toISOString();
    saveJson(TASK_STATE_KEY, state);
    renderTaskState(state);
    return state;
  }

  function renderTaskState(state) {
    var el = getEl('dc-task-status');
    if (!el) return;
    state = state || loadJson(TASK_STATE_KEY, {});
    if (!state.status && !state.headline) {
      el.textContent = '';
      return;
    }
    var statusClass = escHtml(state.status || 'idle');
    var details = [];
    if (state.device_label) details.push('Device: ' + state.device_label);
    if (state.context) details.push('Chat: ' + state.context);
    if (state.updated_at) details.push('Updated: ' + new Date(state.updated_at).toLocaleTimeString());
    el.innerHTML =
      '<div class="dc-task-status-card">' +
        '<div class="dc-task-headline">' + escHtml(state.headline || 'Android Control task') + '</div>' +
        '<div class="dc-task-meta"><span class="dc-task-state ' + statusClass + '">' + escHtml(state.status || '') + '</span></div>' +
        '<div class="dc-task-meta">' + escHtml(details.join(' · ')) + '</div>' +
        (state.message ? '<div class="dc-task-meta">' + escHtml(state.message) + '</div>' : '') +
      '</div>';
  }

  function watchTaskState() {
    var state = loadJson(TASK_STATE_KEY, {});
    if (!state.context) return;
    var meta = getSelectedContextMeta(state.context);
    if (!meta) return;
    var queue = meta.message_queue || [];
    var queued = queue.some(function(item) { return item.id === state.message_id; });
    if (queued && state.status !== 'queued') {
      saveTaskState({status: 'queued', headline: 'Queued in current chat', message: 'Waiting for the current agent turn to finish.'});
      return;
    }
    if (meta.running && state.status !== 'agent_running') {
      saveTaskState({status: 'agent_running', headline: 'Agent running', message: 'The full task transcript is visible in the current chat.'});
      return;
    }
    if (!meta.running && !queued && state.status === 'agent_running') {
      saveTaskState({status: 'completed', headline: 'Agent turn finished', message: 'Check the chat transcript for the detailed result.'});
    }
  }

  window.dcRefreshStatus = function() {
    var focus = getFocusState();
    apiCall('device_status', {device: getActionDevice()}).then(function(data) {
      var active = data.active_device;
      if (active) {
        setConnected(active.serial, active.model || '');
      } else if (focus.mode === 'pinned') {
        getEl('dc-device-id').textContent = focus.serial;
        getEl('dc-device-model').textContent = '--';
        getEl('dc-connection-status').textContent = 'Unavailable';
        getEl('dc-connection-status').className = 'dc-status-badge dc-status-disconnected';
      } else {
        setDisconnected();
      }
    }).catch(function() {
      setDisconnected();
    });
  };

  window.dcConnect = function() {
    document.getElementById('dc-connection-status').textContent = 'Connecting...';
    document.getElementById('dc-connection-status').className = 'dc-status-badge dc-status-disconnected';
    fetchPluginConfig().then(function(cfg) {
      var addr = cfg.device || '';
      if (!addr) {
        dcRefreshStatus();
        return;
      }
      apiCall('connect', {ip_port: addr}).then(function(data) {
        if (data.success) {
          setConnected(data.serial || addr, '');
          dcLoadDevices();
        } else {
          document.getElementById('dc-connection-status').textContent = 'Failed';
        }
      }).catch(function() {
        document.getElementById('dc-connection-status').textContent = 'Failed';
      });
    });
  };

  window.dcDisconnect = function() {
    var dev = getActionDevice();
    apiCall('disconnect', {ip_port: dev || ''}).then(function() {
      if (dev) setFocusAuto();
      setDisconnected();
      dcLoadDevices();
    }).catch(function() {
      if (dev) setFocusAuto();
      setDisconnected();
      dcLoadDevices();
    });
  };

  function withDevice(fn) {
    var dev = getActionDevice();
    if (dev) { fn(dev); return; }
    fetchPluginConfig().then(function(cfg) {
      var d = cfg.device || '';
      if (d) { fn(d); }
      else {
        apiCall('device_status', {}).then(function(data) {
          if (data.active_device) {
            var serial = data.active_device.serial;
            setConnected(serial, data.active_device.model || '');
            fn(serial);
          } else {
            alert('No device connected. Configure device in plugin settings.');
          }
        });
      }
    });
  }

  function runAdb(device, command) {
    return apiCall('adb_command', {device: device, command: command});
  }

  window.dcWake = function() { withDevice(function(d) { runAdb(d, 'shell input keyevent KEYCODE_WAKEUP'); }); };
  window.dcHome = function() { withDevice(function(d) { runAdb(d, 'shell input keyevent KEYCODE_HOME'); }); };
  window.dcBack = function() { withDevice(function(d) { runAdb(d, 'shell input keyevent KEYCODE_BACK'); }); };
  window.dcRecents = function() { withDevice(function(d) { runAdb(d, 'shell input keyevent KEYCODE_APP_SWITCH'); }); };

  window.dcScreenshot = function() {
    withDevice(function(d) {
      document.getElementById('dc-task-status').textContent = 'Taking screenshot...';
      apiCall('screenshot', {device: d}).then(function(data) {
        if (data.success) {
          document.getElementById('dc-screenshot-img').src = data.url + '&' + Date.now();
          document.getElementById('dc-task-status').textContent = 'Screenshot captured (' + data.size_kb + ' KB)';
        } else {
          document.getElementById('dc-task-status').textContent = 'Screenshot failed: ' + (data.message || 'unknown');
        }
      }).catch(function(e) {
        document.getElementById('dc-task-status').textContent = 'Screenshot failed: ' + e.message;
      });
    });
  };

  window.dcScreenDump = function() {
    withDevice(function(d) {
      document.getElementById('dc-task-status').textContent = 'Dumping UI...';
      runAdb(d, 'shell uiautomator dump /sdcard/dc_dump.xml').then(function() {
        return runAdb(d, 'shell cat /sdcard/dc_dump.xml');
      }).then(function(data) {
        document.getElementById('dc-task-status').textContent = 'UI dump captured (see stdout)';
      }).catch(function(e) {
        document.getElementById('dc-task-status').textContent = 'Dump failed: ' + e.message;
      });
    });
  };

  window.dcStartTask = function() {
    var goal = getEl('dc-goal').value.trim();
    if (!goal) { alert('Enter a goal'); return; }

    var device = getActionDevice();
    var deviceLabel = getDeviceLabel(device);
    var focus = getFocusState();
    var context = getCurrentContext();
    getEl('dc-start-btn').disabled = true;
    getEl('dc-stop-btn').disabled = false;
    saveTaskState({
      status: 'preparing',
      headline: 'Preparing Android Control task',
      message: 'Sending the task into the current chat.',
      device: device,
      device_label: deviceLabel,
      focus_mode: focus.mode,
      context: context
    });

    apiCall('run_task', {
      goal: goal,
      device: device,
      device_label: deviceLabel,
      focus_mode: focus.mode,
      context: context,
      dispatch: 'chat_and_panel'
    })
    .then(function(data) {
      if (data.success) {
        saveTaskState({
          status: data.status || (data.queued ? 'queued' : 'sent'),
          headline: data.headline || (data.queued ? 'Queued in current chat' : 'Sent to current chat'),
          message: data.message || 'Task sent.',
          device: device,
          device_label: deviceLabel,
          focus_mode: focus.mode,
          context: data.context || context,
          message_id: data.message_id || '',
          queued: !!data.queued
        });
      } else {
        saveTaskState({
          status: 'failed',
          headline: 'Task dispatch failed',
          message: data.message || 'Unknown error',
          device: device,
          device_label: deviceLabel,
          focus_mode: focus.mode,
          context: context
        });
      }
    })
    .catch(function(e) {
      saveTaskState({status: 'failed', headline: 'Task dispatch failed', message: e.message, device_label: deviceLabel, context: context});
    })
    .finally(function() {
      getEl('dc-start-btn').disabled = false;
      getEl('dc-stop-btn').disabled = true;
    });
  };

  window.dcStopTask = function() {
    saveTaskState({status: 'stopped', headline: 'Panel tracking stopped', message: 'The chat task may still be running in A0.'});
    getEl('dc-start-btn').disabled = false;
    getEl('dc-stop-btn').disabled = true;
  };

  window.dcSaveWorkflow = function() {
    var goal = document.getElementById('dc-goal').value.trim();
    if (!goal) { alert('Enter a goal first'); return; }
    var workflows = JSON.parse(localStorage.getItem('dc-workflows') || '[]');
    workflows.push({ name: goal.substring(0, 50), goal: goal });
    localStorage.setItem('dc-workflows', JSON.stringify(workflows));
    dcRenderWorkflows();
  };

  function dcRenderWorkflows() {
    var workflows = JSON.parse(localStorage.getItem('dc-workflows') || '[]');
    var list = document.getElementById('dc-workflow-list');
    if (workflows.length === 0) {
      list.innerHTML = '<div class="dc-empty-state">No saved workflows</div>';
      return;
    }
    list.innerHTML = workflows.map(function(wf, i) {
      return '<div class="dc-workflow-item">' +
        '<span class="dc-workflow-name">' + wf.name + '</span>' +
        '<div class="dc-workflow-actions">' +
          '<button class="dc-btn dc-btn-small dc-btn-primary" onclick="dcRunWorkflow(' + i + ')">Run</button>' +
          '<button class="dc-btn dc-btn-small dc-btn-danger" onclick="dcDeleteWorkflow(' + i + ')">Del</button>' +
        '</div></div>';
    }).join('');
  }

  window.dcRunWorkflow = function(i) {
    var workflows = JSON.parse(localStorage.getItem('dc-workflows') || '[]');
    var wf = workflows[i];
    if (!wf) return;
    document.getElementById('dc-goal').value = wf.goal;
    dcStartTask();
  };

  window.dcDeleteWorkflow = function(i) {
    var workflows = JSON.parse(localStorage.getItem('dc-workflows') || '[]');
    workflows.splice(i, 1);
    localStorage.setItem('dc-workflows', JSON.stringify(workflows));
    dcRenderWorkflows();
  };

  window.dcLoadDevices = function() {
    return apiCall('device_status', {}).then(function(data) {
      var select = document.getElementById('dc-device-select');
      if (!select) return;
      var devices = data.devices || [];
      var active = data.active_device || null;
      var focus = getFocusState();
      var currentDevice = focus.mode === 'pinned' ? focus.serial : '';
      select.innerHTML = '';
      var autoOpt = document.createElement('option');
      autoOpt.value = '';
      autoOpt.textContent = 'Auto';
      if (focus.mode === 'auto') autoOpt.selected = true;
      select.appendChild(autoOpt);
      if (devices.length === 0) {
        var opt = document.createElement('option');
        opt.value = focus.mode === 'pinned' ? focus.serial : '';
        opt.textContent = focus.mode === 'pinned' ? focus.label + ' (unavailable)' : '-- No devices found --';
        opt.selected = focus.mode === 'pinned';
        select.appendChild(opt);
        if (focus.mode === 'pinned') {
          getEl('dc-device-id').textContent = focus.serial;
          getEl('dc-device-model').textContent = '--';
          getEl('dc-connection-status').textContent = 'Unavailable';
          getEl('dc-connection-status').className = 'dc-status-badge dc-status-disconnected';
        } else {
          setDisconnected();
        }
        savePanelState({devices: [], backend: data.adb_backend || '', status: focus.mode === 'pinned' ? 'Pinned unavailable' : 'No devices'});
        if (focus.mode !== 'pinned') getEl('dc-connection-status').textContent = 'No devices';
        dcStopAutoRefresh();
        return;
      }
      var foundCurrent = false;
      var selectedDevice = null;
      devices.forEach(function(dev) {
        var opt = document.createElement('option');
        opt.value = dev.serial;
        opt.textContent = (dev.model || dev.serial) + ' (' + dev.serial + ')';
        if (focus.mode === 'pinned' && (dev.serial === currentDevice || (dev.aliases || []).indexOf(currentDevice) >= 0)) {
          opt.selected = true;
          foundCurrent = true;
          selectedDevice = dev;
        }
        select.appendChild(opt);
      });
      if (focus.mode === 'pinned' && !foundCurrent) {
        var missing = document.createElement('option');
        missing.value = focus.serial;
        missing.textContent = (focus.label || focus.serial) + ' (unavailable)';
        missing.selected = true;
        select.appendChild(missing);
        getEl('dc-device-id').textContent = focus.serial;
        getEl('dc-device-model').textContent = '--';
        getEl('dc-connection-status').textContent = 'Unavailable';
        getEl('dc-connection-status').className = 'dc-status-badge dc-status-disconnected';
        savePanelState({devices: devices, backend: data.adb_backend || '', status: 'Pinned unavailable'});
        dcStopAutoRefresh();
        return;
      } else if (focus.mode === 'pinned') {
        setConnected(selectedDevice.serial, selectedDevice.model || '');
      } else {
        var fallback = active || devices[0];
        select.value = '';
        setConnected(fallback.serial, fallback.model || '');
      }
      savePanelState({devices: devices, backend: data.adb_backend || '', status: focus.mode === 'pinned' ? 'Pinned' : 'Connected'});
      dcStartAutoRefresh();
    }).catch(function() {
      var select = document.getElementById('dc-device-select');
      if (select) {
        select.innerHTML = '<option value="">-- Error loading devices --</option>';
      }
      setDisconnected();
      getEl('dc-connection-status').textContent = 'Error';
    });
  };

  window.dcSelectDevice = function(serial) {
    if (!serial) {
      setFocusAuto();
      dcLoadDevices();
      return;
    }
    var select = document.getElementById('dc-device-select');
    var model = '';
    var label = serial;
    if (select) {
      for (var i = 0; i < select.options.length; i++) {
        if (select.options[i].value === serial) {
          label = select.options[i].textContent;
          model = label.split(' (')[0];
          break;
        }
      }
    }
    var panelState = loadJson(PANEL_STATE_KEY, {});
    var match = (panelState.devices || []).filter(function(dev) { return dev.serial === serial; })[0] || {};
    setFocusPinned(serial, label, match.aliases || []);
    setConnected(serial, model);
    dcStartAutoRefresh();
    dcScreenshot();
  };

  function dcInitializePanel() {
    if (dcInitialized || !panelReady()) return;
    dcInitialized = true;
    restorePanelState();
    renderTaskState(loadJson(TASK_STATE_KEY, {}));
    dcRenderWorkflows();
    dcLoadDevices();
    dcDeviceRefreshTimer = setInterval(function() { dcLoadDevices(); }, 10000);
    dcTaskWatchTimer = setInterval(watchTaskState, 1500);
    dcVisibilityHandler = function() {
      if (!document.hidden && panelReady()) dcLoadDevices();
    };
    dcFocusHandler = function() {
      if (panelReady()) dcLoadDevices();
    };
    document.addEventListener('visibilitychange', dcVisibilityHandler);
    window.addEventListener('focus', dcFocusHandler);
  }

  whenPanelReady(dcInitializePanel);

  // Auto-refresh screen preview
  function dcStartAutoRefresh() {
    if (dcAutoRefreshInterval) return;
    var badge = document.getElementById('dc-live-badge');
    if (badge) badge.style.display = 'inline';
    dcAutoRefreshInterval = setInterval(function() {
      var focus = getFocusState();
      var dev = getActionDevice();
      if (!dev && focus.mode !== 'auto') {
        dcStopAutoRefresh();
        return;
      }
      dcCaptureAutoRefresh(dev);
    }, 5000);
  }

  function dcCaptureAutoRefresh(dev) {
    apiCall('screenshot', {device: dev}).then(function(data) {
      if (data.success) {
        document.getElementById('dc-screenshot-img').src = data.url + '&' + Date.now();
      }
    }).catch(function() {});
  }

  function dcStopAutoRefresh() {
    if (dcAutoRefreshInterval) {
      clearInterval(dcAutoRefreshInterval);
      dcAutoRefreshInterval = null;
    }
    var badge = document.getElementById('dc-live-badge');
    if (badge) badge.style.display = 'none';
  }

  // Cleanup auto-refresh on modal close
  window.__dcPanelCleanup = function() {
    dcStopAutoRefresh();
    if (dcDeviceRefreshTimer) { clearInterval(dcDeviceRefreshTimer); dcDeviceRefreshTimer = null; }
    if (dcTaskWatchTimer) { clearInterval(dcTaskWatchTimer); dcTaskWatchTimer = null; }
    if (dcVisibilityHandler) { document.removeEventListener('visibilitychange', dcVisibilityHandler); dcVisibilityHandler = null; }
    if (dcFocusHandler) { window.removeEventListener('focus', dcFocusHandler); dcFocusHandler = null; }
    dcInitialized = false;
  };

  var dcOrigCloseModal = window.closeModal;
  window.closeModal = function() {
    if (typeof window.__dcPanelCleanup === 'function') window.__dcPanelCleanup();
    if (dcOrigCloseModal) dcOrigCloseModal.apply(this, arguments);
  };

 })();
</script>
